<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b61dd"/>
      <stop offset="1" stop-color="#2a2d6b"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="104" ry="104" fill="url(#bg)"/>

  <!-- staff lines -->
  <g stroke="#ffffff" stroke-opacity="0.32" stroke-width="7">
    <line x1="96" y1="150" x2="372" y2="150"/>
    <line x1="96" y1="205" x2="372" y2="205"/>
    <line x1="96" y1="260" x2="372" y2="260"/>
    <line x1="96" y1="315" x2="372" y2="315"/>
    <line x1="96" y1="370" x2="372" y2="370"/>
  </g>

  <!-- four-voice chord (SATB) -->
  <g fill="#ffffff">
    <ellipse cx="196" cy="150" rx="46" ry="33"/>
    <ellipse cx="196" cy="205" rx="46" ry="33"/>
    <ellipse cx="196" cy="260" rx="46" ry="33"/>
    <ellipse cx="196" cy="315" rx="46" ry="33"/>
    <rect x="236" y="120" width="13" height="200"/>
  </g>

  <!-- green check badge -->
  <circle cx="372" cy="384" r="92" fill="#2ecc71"/>
  <polyline points="330,388 362,422 418,348" fill="none" stroke="#ffffff"
            stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
